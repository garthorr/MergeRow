server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all Baserow API calls so the browser talks to same-origin /api/
    # and never has to deal with CORS. The Authorization header set by the
    # frontend is forwarded as-is.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        proxy_pass https://api.baserow.io/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.baserow.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app: let React Router (or similar) handle client-side paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
