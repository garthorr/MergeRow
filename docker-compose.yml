services:
  mergerow:
    build: .
    container_name: mergerow
    restart: unless-stopped
    environment:
      # Baserow instance the app proxies /api/ to. Set in a local .env file
      # (see .env.example) so the real URL never ends up in version control.
      BASEROW_URL: ${BASEROW_URL:?Set BASEROW_URL in a .env file — see .env.example}
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.mergerow.rule=Host(`mergerow.home.tastymath.com`)
      - traefik.http.routers.mergerow.entrypoints=websecure
      - traefik.http.routers.mergerow.tls.certresolver=le
      - traefik.http.services.mergerow.loadbalancer.server.port=80

networks:
  traefik:
    external: true
