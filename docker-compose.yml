services:
  mergerow:
    build: .
    container_name: mergerow
    restart: unless-stopped
    environment:
      # Baserow instance the app proxies /api/ to. Override here (or with a
      # .env file) to point at a different instance without rebuilding.
      BASEROW_URL: https://baserow.home.tastymath.com
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.mergerow.rule=Host(`mergerow.home.tastymath.com`)
      - traefik.http.routers.mergerow.entrypoints=websecure
      - traefik.http.routers.mergerow.tls.certresolver=le
      - traefik.http.services.mergerow.loadbalancer.server.port=80

networks:
  traefik:
    external: true
